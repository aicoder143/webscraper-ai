<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebScraper AI</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080b0f;--bg2:#0e1318;--bg3:#141c24;--bg4:#1a2535;
  --border:#1e2d3d;--border2:#2a3f55;
  --accent:#00d4ff;--accent2:#00ff88;--accent3:#ff6b35;
  --text:#c9d8e8;--text2:#607d8b;--text3:#38505f;
  --danger:#ff4757;--warn:#ffa502;
  --mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--mono);}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),
  linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}

/* ── Header ── */
header{position:relative;z-index:100;height:56px;padding:0 28px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(8,11,15,0.98);}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:28px;height:28px;border:2px solid var(--accent);
  border-radius:7px;display:flex;align-items:center;justify-content:center;}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;
  animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(1);}50%{opacity:1;transform:scale(1.4);}}
.logo-name{font-family:var(--sans);font-size:17px;font-weight:800;color:#fff;}
.logo-name span{color:var(--accent);}
.sys{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text2);}
.sys-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);
  animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

/* ── Layout ── */
.layout{position:relative;z-index:10;display:flex;
  height:calc(100vh - 56px);}

/* ── Left sidebar ── */
.sidebar{width:340px;flex-shrink:0;border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;background:var(--bg2);}

.s-block{padding:14px 16px;border-bottom:1px solid var(--border);}
.s-label{font-size:10px;font-weight:500;color:var(--text3);
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:9px;}

/* Input */
.input-row{display:flex;gap:7px;}
.url-inp{flex:1;background:var(--bg3);border:1px solid var(--border);
  border-radius:6px;padding:9px 12px;color:var(--text);
  font-family:var(--mono);font-size:12px;outline:none;transition:border .2s;}
.url-inp:focus{border-color:var(--accent);
  box-shadow:0 0 0 2px rgba(0,212,255,.08);}
.url-inp::placeholder{color:var(--text3);}

.btn{padding:9px 14px;border-radius:6px;border:none;
  font-family:var(--mono);font-size:12px;font-weight:500;
  cursor:pointer;transition:all .2s;white-space:nowrap;outline:none;}
.btn-primary{background:var(--accent);color:#000;}
.btn-primary:hover{background:#2de0ff;
  box-shadow:0 0 14px rgba(0,212,255,.35);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:5px;}
.btn-ghost{background:transparent;color:var(--text2);
  border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-success{background:transparent;color:var(--accent2);
  border:1px solid rgba(0,255,136,.4);}
.btn-success:hover{background:rgba(0,255,136,.08);}
.btn-warn{background:transparent;color:var(--accent3);
  border:1px solid rgba(255,107,53,.4);}
.btn-warn:hover{background:rgba(255,107,53,.08);}
.btn-danger{background:transparent;color:var(--danger);
  border:1px solid rgba(255,71,87,.3);}
.btn-danger:hover{background:rgba(255,71,87,.08);
  border-color:var(--danger);}

/* Terminal */
.terminal{background:var(--bg);border:1px solid var(--border);
  border-radius:6px;padding:10px 12px;font-size:11px;line-height:1.7;
  height:120px;overflow-y:auto;}
.terminal::-webkit-scrollbar{width:3px;}
.terminal::-webkit-scrollbar-thumb{background:var(--border2);}
.ll{display:flex;gap:8px;}
.lt{color:var(--text3);flex-shrink:0;font-size:10px;}
.li{color:var(--accent);}
.lk{color:var(--accent2);}
.le{color:var(--danger);}
.lw{color:var(--warn);}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.stat{background:var(--bg3);border:1px solid var(--border);
  border-radius:6px;padding:8px 6px;text-align:center;}
.stat-n{font-family:var(--sans);font-size:20px;font-weight:800;
  color:var(--accent);line-height:1;}
.stat-l{font-size:9px;color:var(--text3);margin-top:1px;
  text-transform:uppercase;}

/* Jobs list */
.jobs-wrap{flex:1;overflow-y:auto;padding:8px;}
.jobs-wrap::-webkit-scrollbar{width:3px;}
.jobs-wrap::-webkit-scrollbar-thumb{background:var(--border2);}

/* ── JOB CARD — fully clickable ── */
.job-card{
  display:block;
  width:100%;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:8px;
  padding:12px;
  margin-bottom:8px;
  cursor:pointer;
  transition:all .18s;
  text-align:left;
  font-family:var(--mono);
  color:var(--text);
  text-decoration:none;
  -webkit-appearance:none;
  appearance:none;
}
.job-card:hover{
  border-color:var(--border2);
  background:var(--bg4);
  transform:translateX(2px);
}
.job-card.active{
  border-color:var(--accent);
  background:var(--bg4);
}
.job-card:focus{
  outline:2px solid var(--accent);
  outline-offset:2px;
}
.jc-top{display:flex;align-items:center;
  justify-content:space-between;gap:8px;margin-bottom:5px;}
.jc-url{font-size:12px;color:var(--text);overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;flex:1;font-weight:500;}
.jc-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.jc-stat{font-size:10px;color:var(--text3);}
.jc-stat b{color:var(--text2);}
.jc-icons{display:flex;gap:5px;margin-top:4px;}
.jc-icon{font-size:10px;padding:1px 6px;border-radius:3px;}
.jc-pdf{color:var(--accent3);background:rgba(255,107,53,.1);}
.jc-ai{color:var(--accent2);background:rgba(0,255,136,.1);}

/* Progress */
.prog{height:2px;background:var(--border);border-radius:1px;margin-top:6px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:1px;transition:width .5s ease;}

/* Badge */
.badge{display:inline-flex;align-items:center;gap:4px;
  padding:2px 7px;border-radius:10px;font-size:10px;font-weight:500;}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;}
.b-pending{background:rgba(255,165,2,.15);color:var(--warn);}
.b-pending::before{background:var(--warn);animation:blink .8s infinite;}
.b-scraping{background:rgba(0,212,255,.15);color:var(--accent);}
.b-scraping::before{background:var(--accent);animation:blink .4s infinite;}
.b-done{background:rgba(0,255,136,.15);color:var(--accent2);}
.b-done::before{background:var(--accent2);}
.b-failed{background:rgba(255,71,87,.15);color:var(--danger);}
.b-failed::before{background:var(--danger);}

/* ── Right panel ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.main-hdr{height:52px;padding:0 24px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(8,11,15,.6);flex-shrink:0;}
.main-title{font-family:var(--sans);font-size:14px;font-weight:600;}
.main-acts{display:flex;gap:7px;}
.main-body{flex:1;overflow-y:auto;padding:24px;}
.main-body::-webkit-scrollbar{width:4px;}
.main-body::-webkit-scrollbar-thumb{background:var(--border2);}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;}
.tab{padding:8px 16px;font-size:11px;color:var(--text3);cursor:pointer;
  border-bottom:2px solid transparent;transition:all .18s;
  background:none;border-top:none;border-left:none;border-right:none;
  font-family:var(--mono);outline:none;}
.tab:hover{color:var(--text2);}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);}

/* Overview cards */
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;
  margin-bottom:16px;}
.ov-card{background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;padding:14px;}
.ov-card.full{grid-column:1/-1;}
.ov-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:5px;}
.ov-val{font-size:13px;color:var(--text);}
.ov-val.big{font-family:var(--sans);font-size:22px;
  font-weight:800;color:var(--accent);}

/* Search */
.search-bar{display:flex;gap:8px;margin-bottom:16px;}
.search-inp{flex:1;background:var(--bg3);border:1px solid var(--border);
  border-radius:6px;padding:9px 12px;color:var(--text);
  font-family:var(--mono);font-size:12px;outline:none;transition:border .2s;}
.search-inp:focus{border-color:var(--accent);}
.search-inp::placeholder{color:var(--text3);}
.search-results{background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;overflow:hidden;}
.sr-header{padding:10px 16px;border-bottom:1px solid var(--border);
  font-size:11px;color:var(--text2);}
.sr-item{padding:12px 16px;border-bottom:1px solid rgba(30,45,61,.5);}
.sr-item:last-child{border-bottom:none;}
.sr-item:hover{background:rgba(0,212,255,.03);}
.sr-title{font-size:12px;color:var(--text);margin-bottom:3px;}
.sr-url{font-size:10px;color:var(--accent);margin-bottom:5px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sr-snippet{font-size:11px;color:var(--text2);line-height:1.6;}
.sr-snippet mark{background:rgba(0,212,255,.25);color:var(--accent);
  border-radius:2px;padding:0 2px;}
.sr-none{padding:32px;text-align:center;font-size:12px;color:var(--text3);}

/* Pages list */
.pages-box{background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;overflow:hidden;}
.pg-row{display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-bottom:1px solid rgba(30,45,61,.4);}
.pg-row:last-child{border-bottom:none;}
.pg-n{color:var(--text3);font-size:10px;width:20px;flex-shrink:0;}
.pg-title{flex:1;font-size:11px;color:var(--text);overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;}
.pg-w{font-size:10px;color:var(--text3);background:var(--bg3);
  border:1px solid var(--border);padding:1px 6px;border-radius:3px;
  flex-shrink:0;}

/* Analysis */
.an-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.an-card{background:var(--bg2);border:1px solid var(--border);
  border-radius:8px;padding:14px;}
.an-card.full{grid-column:1/-1;}
.an-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:6px;}
.an-val{font-size:13px;color:var(--text);}
.an-val.hl{color:var(--accent);font-family:var(--sans);
  font-size:15px;font-weight:700;}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:3px;}
.tag{padding:2px 8px;background:var(--bg3);border:1px solid var(--border);
  border-radius:4px;font-size:10px;color:var(--text2);}
.facts{list-style:none;}
.facts li{padding:5px 0;border-bottom:1px solid rgba(30,45,61,.5);
  font-size:11px;color:var(--text2);}
.facts li:last-child{border-bottom:none;}
.facts li::before{content:'▸ ';color:var(--accent);}

/* Empty / loading */
.empty{display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;gap:10px;color:var(--text3);}
.empty-ico{font-size:40px;opacity:.15;}
.empty-msg{font-family:var(--sans);font-size:14px;}
.empty-sub{font-size:11px;}
.loading{text-align:center;padding:40px;font-size:12px;color:var(--text3);}

@keyframes spin{to{transform:rotate(360deg);}}
.spin{animation:spin 1s linear infinite;display:inline-block;}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}
  to{opacity:1;transform:translateY(0);}}
.fadein{animation:fadein .25s ease;}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark"><div class="logo-dot"></div></div>
    <div class="logo-name">Web<span>Scraper</span> AI</div>
  </div>
  <div class="sys"><div class="sys-dot"></div>All systems operational</div>
</header>

<div class="layout">

  <!-- ── Sidebar ── -->
  <div class="sidebar">

    <div class="s-block">
      <div class="s-label">New Scrape Job</div>
      <div class="input-row">
        <input id="url-inp" class="url-inp" type="url"
          placeholder="https://example.com" autocomplete="off"/>
        <button class="btn btn-primary" id="run-btn" onclick="submitScrape()">
          Run
        </button>
      </div>
    </div>

    <div class="s-block">
      <div class="s-label">System Log</div>
      <div class="terminal" id="terminal">
        <div class="ll"><span class="lt">--:--:--</span>
          <span class="li">System ready.</span></div>
      </div>
    </div>

    <div class="s-block">
      <div class="s-label">Stats</div>
      <div class="stats">
        <div class="stat">
          <div class="stat-n" id="s-total">0</div>
          <div class="stat-l">Jobs</div>
        </div>
        <div class="stat">
          <div class="stat-n" id="s-done"
            style="color:var(--accent2)">0</div>
          <div class="stat-l">Done</div>
        </div>
        <div class="stat">
          <div class="stat-n" id="s-pages">0</div>
          <div class="stat-l">Pages</div>
        </div>
        <div class="stat">
          <div class="stat-n" id="s-words"
            style="color:var(--accent3)">0</div>
          <div class="stat-l">K words</div>
        </div>
      </div>
    </div>

    <div class="s-block" style="padding-bottom:8px;">
      <div class="s-label">Recent Jobs</div>
    </div>

    <div class="jobs-wrap" id="jobs-wrap">
      <div style="padding:16px;text-align:center;
        font-size:11px;color:var(--text3);">No jobs yet</div>
    </div>

  </div>

  <!-- ── Main panel ── -->
  <div class="main">
    <div class="main-hdr">
      <div class="main-title" id="main-title">
        Select a job to view results
      </div>
      <div class="main-acts" id="main-acts"></div>
    </div>
    <div class="main-body" id="main-body">
      <div class="empty">
        <div class="empty-ico">◈</div>
        <div class="empty-msg">No job selected</div>
        <div class="empty-sub">
          Submit a URL or click a job card on the left
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const API = '/api';
let selId = null;
let polls = {};

/* ── csrf ── */
function csrf() {
  const m = document.cookie.match('(^|;)\\s*csrftoken\\s*=\\s*([^;]+)');
  return m ? m.pop() : '';
}

/* ── log ── */
function log(msg, t='i') {
  const el = document.getElementById('terminal');
  const ts = new Date().toTimeString().slice(0,8);
  const d  = document.createElement('div');
  d.className = 'll';
  d.innerHTML =
    `<span class="lt">${ts}</span><span class="l${t}">${msg}</span>`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
  while (el.children.length > 80) el.removeChild(el.firstChild);
}

/* ── submit ── */
async function submitScrape() {
  const inp = document.getElementById('url-inp');
  const btn = document.getElementById('run-btn');
  const url = inp.value.trim();
  if (!url) { log('Enter a URL first','w'); return; }
  if (!url.startsWith('http')) {
    log('URL must start with http:// or https://','e'); return;
  }
  btn.disabled = true;
  btn.innerHTML = '<span class="spin">↻</span>';
  log(`Submitting: ${url}`,'i');
  try {
    const r = await fetch(`${API}/scrape/`, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'X-CSRFToken':csrf()
      },
      body:JSON.stringify({url})
    });
    const d = await r.json();
    if (r.ok) {
      log(`Job #${d.id} started — discovering sitemap...`,'k');
      inp.value = '';
      await loadJobs();
      poll(d.id);
    } else {
      log(`Error: ${d.error||'unknown'}`,'e');
    }
  } catch(e) {
    log(`Network error: ${e.message}`,'e');
  }
  btn.disabled = false;
  btn.textContent = 'Run';
}

/* ── poll single job ── */
function poll(id) {
  if (polls[id]) return;
  polls[id] = setInterval(async () => {
    try {
      const r = await fetch(`${API}/status/${id}/`);
      const d = await r.json();
      if (d.status === 'done') {
        log(`#${id} complete — ${d.pages_with_content} pages, `+
            `${(d.total_words||0).toLocaleString()} words`,'k');
        clearInterval(polls[id]); delete polls[id];
        await loadJobs();
        if (selId === id) showJob(id);
      } else if (d.status === 'failed') {
        log(`#${id} failed`,'e');
        clearInterval(polls[id]); delete polls[id];
        await loadJobs();
      } else if (d.status === 'scraping') {
        log(`#${id} — ${d.pages_with_content}/${d.pages_found} pages`,'i');
        await loadJobs();
      }
    } catch(e) {}
  }, 3000);
}

/* ── load all jobs ── */
async function loadJobs() {
  try {
    const r    = await fetch(`${API}/scrape/`);
    const jobs = await r.json();
    renderJobs(jobs);
    updateStats(jobs);
    jobs.forEach(j => {
      if (j.status==='scraping'||j.status==='pending') poll(j.id);
    });
  } catch(e) {}
}

/* ── render job cards ── */
function renderJobs(jobs) {
  const el = document.getElementById('jobs-wrap');
  if (!jobs.length) {
    el.innerHTML = `<div style="padding:20px;text-align:center;
      font-size:11px;color:var(--text3);">No jobs yet</div>`;
    return;
  }
  el.innerHTML = jobs.map(j => {
    const pct = j.pages_found
      ? Math.round((j.pages_with_content/j.pages_found)*100) : 0;
    let domain = j.url;
    try { domain = new URL(j.url).hostname.replace('www.',''); }
    catch(e) {}
    return `
<button
  class="job-card ${selId===j.id?'active':''}"
  onclick="selectJob(${j.id})"
  type="button"
  aria-label="View job ${j.id}: ${domain}">
  <div class="jc-top">
    <span class="jc-url" title="${j.url}">${domain}</span>
    <span class="badge b-${j.status}">${j.status}</span>
  </div>
  <div class="jc-meta">
    <span class="jc-stat">pages <b>${j.pages_with_content}/${j.pages_found}</b></span>
    <span class="jc-stat">words <b>${(j.total_words||0).toLocaleString()}</b></span>
  </div>
  <div class="jc-icons">
    ${j.has_pdf
      ? '<span class="jc-icon jc-pdf">PDF ✓</span>' : ''}
    ${j.has_analysis
      ? '<span class="jc-icon jc-ai">AI ✓</span>' : ''}
  </div>
  ${j.status==='scraping'
    ? `<div class="prog">
         <div class="prog-fill" style="width:${pct}%"></div>
       </div>` : ''}
</button>`;
  }).join('');
}

/* ── stats ── */
function updateStats(jobs) {
  document.getElementById('s-total').textContent =
    jobs.length;
  document.getElementById('s-done').textContent =
    jobs.filter(j=>j.status==='done').length;
  document.getElementById('s-pages').textContent =
    jobs.reduce((a,j)=>a+j.pages_with_content,0);
  document.getElementById('s-words').textContent =
    Math.round(jobs.reduce((a,j)=>a+(j.total_words||0),0)/1000);
}

/* ── select job (called from button onclick) ── */
function selectJob(id) {
  selId = id;
  loadJobs();
  showJob(id);
}

/* ── show job detail ── */
async function showJob(id) {
  const body = document.getElementById('main-body');
  body.innerHTML = `<div class="loading">
    <span class="spin">↻</span> Loading...</div>`;

  const r    = await fetch(`${API}/status/${id}/`);
  const data = await r.json();

  let domain = data.url;
  try { domain = new URL(data.url).hostname; } catch(e) {}

  document.getElementById('main-title').textContent = domain;
  document.getElementById('main-acts').innerHTML = `
    ${data.has_pdf
      ? `<button class="btn btn-warn btn-sm"
           onclick="downloadPDF(${id})">Download PDF</button>`
      : `<button class="btn btn-ghost btn-sm"
           onclick="triggerPDF(${id})">Generate PDF</button>`}
    ${data.has_analysis
      ? `<button class="btn btn-success btn-sm"
           onclick="selectTab('analysis',${id})">AI Analysis</button>`
      : `<button class="btn btn-ghost btn-sm"
           onclick="triggerAnalysis(${id})">Run AI</button>`}
    <button class="btn btn-danger btn-sm"
      onclick="deleteJob(${id})">Delete</button>
  `;

  body.innerHTML = `
<div class="fadein">
  <div class="tabs" id="tabs-${id}">
    <button class="tab on" onclick="selectTab('overview',${id})"
      type="button">Overview</button>
    <button class="tab" onclick="selectTab('search',${id})"
      type="button">Search</button>
    <button class="tab" onclick="selectTab('pages',${id})"
      type="button">Pages (${data.pages_with_content})</button>
    ${data.has_analysis
      ? `<button class="tab"
           onclick="selectTab('analysis',${id})"
           type="button">AI Analysis</button>` : ''}
  </div>

  <!-- Overview -->
  <div id="pane-overview">
    <div class="ov-grid">
      <div class="ov-card full">
        <div class="ov-lbl">URL</div>
        <div class="ov-val" style="font-size:11px;
          word-break:break-all;">${data.url}</div>
      </div>
      <div class="ov-card">
        <div class="ov-lbl">Status</div>
        <div class="ov-val">
          <span class="badge b-${data.status}">${data.status}</span>
        </div>
      </div>
      <div class="ov-card">
        <div class="ov-lbl">Scrape mode</div>
        <div class="ov-val">${data.scrape_mode||'—'}</div>
      </div>
      <div class="ov-card">
        <div class="ov-lbl">Pages scraped</div>
        <div class="ov-val big">
          ${data.pages_with_content}
          <span style="font-size:14px;color:var(--text3)">
            / ${data.pages_found}</span>
        </div>
      </div>
      <div class="ov-card">
        <div class="ov-lbl">Total words</div>
        <div class="ov-val big">
          ${(data.total_words||0).toLocaleString()}
        </div>
      </div>
      <div class="ov-card">
        <div class="ov-lbl">PDF</div>
        <div class="ov-val" style="color:${data.has_pdf
          ? 'var(--accent3)':'var(--text3)'}">
          ${data.has_pdf ? 'Ready to download' : 'Not generated'}
        </div>
      </div>
      <div class="ov-card">
        <div class="ov-lbl">AI Analysis</div>
        <div class="ov-val" style="color:${data.has_analysis
          ? 'var(--accent2)':'var(--text3)'}">
          ${data.has_analysis ? 'Complete' : 'Not run yet'}
        </div>
      </div>
      <div class="ov-card full">
        <div class="ov-lbl">Scraped at</div>
        <div class="ov-val">
          ${new Date(data.created_at).toLocaleString()}
        </div>
      </div>
    </div>
  </div>

  <!-- Search pane -->
  <div id="pane-search" style="display:none;">
    <div class="search-bar">
      <input id="kw-inp" class="search-inp"
        placeholder="Search keywords across all scraped pages..."
        oninput="debounceSearch(${id})"
        autocomplete="off"/>
      <button class="btn btn-primary btn-sm"
        onclick="doSearch(${id})" type="button">Search</button>
    </div>
    <div id="search-out-${id}">
      <div class="sr-none">
        Enter a keyword to search all scraped content
      </div>
    </div>
  </div>

  <!-- Pages pane -->
  <div id="pane-pages" style="display:none;">
    <div class="pages-box">
      ${data.sample_pages.map((p,i) => `
        <div class="pg-row">
          <span class="pg-n">${i+1}</span>
          <span class="pg-title" title="${p.url}">
            ${p.title||p.url}
          </span>
          <span class="pg-w">
            ${(p.word_count||0).toLocaleString()}w
          </span>
        </div>`).join('')}
      ${data.pages_with_content > 10
        ? `<div style="padding:10px 14px;font-size:10px;
             color:var(--text3);">
             Showing 10 of ${data.pages_with_content} pages
           </div>` : ''}
    </div>
  </div>

  <!-- Analysis pane -->
  <div id="pane-analysis" style="display:none;">
    <div class="loading">Loading analysis...</div>
  </div>
</div>`;

  /* focus search input when tab shown */
}

/* ── tab switching ── */
function selectTab(name, id) {
  ['overview','search','pages','analysis'].forEach(n => {
    const p = document.getElementById(`pane-${n}`);
    if (p) p.style.display = n===name ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.remove('on');
    if (t.textContent.toLowerCase().startsWith(name)) {
      t.classList.add('on');
    }
  });
  if (name === 'analysis') loadAnalysisPane(id);
  if (name === 'search') {
    setTimeout(() => {
      const inp = document.getElementById('kw-inp');
      if (inp) inp.focus();
    }, 50);
  }
}

/* ── keyword search ── */
let searchTimer = null;
function debounceSearch(id) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => doSearch(id), 400);
}

async function doSearch(id) {
  const kw  = (document.getElementById('kw-inp').value||'').trim();
  const out = document.getElementById(`search-out-${id}`);
  if (!kw) {
    out.innerHTML = `<div class="sr-none">
      Enter a keyword to search all scraped content</div>`;
    return;
  }
  out.innerHTML = `<div class="loading">
    <span class="spin">↻</span> Searching...</div>`;

  try {
    const r = await fetch(
      `${API}/search/${id}/?q=${encodeURIComponent(kw)}`
    );
    const d = await r.json();
    if (!d.results || !d.results.length) {
      out.innerHTML = `<div class="sr-none">
        No results for "<b>${esc(kw)}</b>"</div>`;
      return;
    }
    out.innerHTML = `
      <div class="search-results">
        <div class="sr-header">
          ${d.results.length} result${d.results.length!==1?'s':''} for
          "<b>${esc(kw)}</b>"
        </div>
        ${d.results.map(r => `
          <div class="sr-item">
            <div class="sr-title">${esc(r.title||'Untitled')}</div>
            <div class="sr-url">${esc(r.url)}</div>
            <div class="sr-snippet">${r.snippet}</div>
          </div>`).join('')}
      </div>`;
  } catch(e) {
    out.innerHTML = `<div class="sr-none" style="color:var(--danger);">
      Search error: ${e.message}</div>`;
  }
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ── analysis pane ── */

        <div class="sr-none">
          Analysis not ready yet.
          <br><br>
          <button class="btn btn-ghost btn-sm"
            onclick="triggerAnalysis(${id})" type="button">
            Run AI Analysis
          </button>
        </div>`;
      return;
    }
    const data = await r.json();
    const d    = data.extracted_data;
    pane.innerHTML = `
      <div class="an-grid fadein">
        <div class="an-card">
          <div class="an-lbl">Business / Site name</div>
          <div class="an-val hl">${esc(d.business_name||'—')}</div>
        </div>
        <div class="an-card">
          <div class="an-lbl">Type</div>
          <div class="an-val">${esc(d.business_type||'—')}</div>
        </div>
        <div class="an-card full">
          <div class="an-lbl">Description</div>
          <div class="an-val" style="font-size:12px;line-height:1.7;">
            ${esc(d.description||'—')}
          </div>
        </div>
        <div class="an-card">
          <div class="an-lbl">Main topics</div>
          <div class="tags">
            ${(d.main_topics||[]).map(t=>
              `<span class="tag">${esc(t)}</span>`
            ).join('')||'—'}
          </div>
        </div>
        <div class="an-card">
          <div class="an-lbl">Products / Services</div>
          <div class="tags">
            ${(d.products_services||[]).map(t=>
              `<span class="tag">${esc(t)}</span>`
            ).join('')||'None found'}
          </div>
        </div>
        <div class="an-card">
          <div class="an-lbl">Contact email</div>
          <div class="an-val">
            ${d.contact_email
              ? `<a href="mailto:${esc(d.contact_email)}"
                   style="color:var(--accent)">${esc(d.contact_email)}</a>`
              : 'Not found'}
          </div>
        </div>
        <div class="an-card">
          <div class="an-lbl">Contact phone</div>
          <div class="an-val">
            ${esc(d.contact_phone||'Not found')}
          </div>
        </div>
        <div class="an-card">
          <div class="an-lbl">Location</div>
          <div class="an-val">
            ${esc(d.location||'Not detected')}
          </div>
        </div>
        <div class="an-card">
          <div class="an-lbl">Language</div>
          <div class="an-val">${esc(d.language||'—')}</div>
        </div>
        <div class="an-card">
          <div class="an-lbl">Sentiment</div>
          <div class="an-val">${esc(d.sentiment||'—')}</div>
        </div>
        <div class="an-card full">
          <div class="an-lbl">Key facts</div>
          <ul class="facts">
            ${(d.key_facts||[]).map(f=>
              `<li>${esc(f)}</li>`
            ).join('')}
          </ul>
        </div>
        <div class="an-card">
          <div class="an-lbl">Social links</div>
          <div class="tags">
            ${(d.social_links||[]).map(l=>
              `<span class="tag">${esc(l)}</span>`
            ).join('')||'None found'}
          </div>
        </div>
        <div class="an-card">
          <div class="an-lbl">Extraction method</div>
          <div class="an-val" style="color:var(--accent3);">
            ${esc(d.extraction_method||'—')}
          </div>
        </div>
      </div>`;
  } catch(e) {
    pane.innerHTML = `<div class="sr-none" style="color:var(--danger);">
      Failed to load analysis: ${e.message}</div>`;
  }
}

/* ── actions ── */
function downloadPDF(id) {
  window.open(`${API}/pdf/${id}/`, '_blank');
}

async function triggerPDF(id) {
  await fetch(`${API}/pdf/${id}/`, {
    method:'POST',headers:{'X-CSRFToken':csrf()}});
  log(`#${id} PDF generation started`,'i');
  setTimeout(()=>{ loadJobs(); showJob(id); }, 4000);
}

async function triggerAnalysis(id) {
  await fetch(`${API}/analysis/${id}/`, {
    method:'POST',headers:{'X-CSRFToken':csrf()}});
  log(`#${id} AI analysis started`,'i');
  setTimeout(()=>{ loadJobs(); showJob(id); }, 5000);
}

async function deleteJob(id) {
  if (!confirm(`Delete job #${id}? This cannot be undone.`)) return;
  await fetch(`${API}/status/${id}/`, {
    method:'DELETE',headers:{'X-CSRFToken':csrf()}});
  selId = null;
  document.getElementById('main-title').textContent =
    'Select a job to view results';
  document.getElementById('main-acts').innerHTML = '';
  document.getElementById('main-body').innerHTML = `
    <div class="empty">
      <div class="empty-ico">◈</div>
      <div class="empty-msg">Job deleted</div>
    </div>`;
  log(`#${id} deleted`,'w');
  loadJobs();
}

/* ── enter key ── */
document.getElementById('url-inp')
  .addEventListener('keydown', e => {
    if (e.key==='Enter') submitScrape();
  });

/* ── init ── */
loadJobs();
setInterval(loadJobs, 5000);
</script>
